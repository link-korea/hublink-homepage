<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>허브링크 관리자</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1E3A8A; --cyan:#06B6D4; --green:#10B981; --red:#E31937;
    --gray:#6B7280; --light:#F3F4F6; --line:#E5E7EB; --dark:#111827;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',-apple-system,'Segoe UI',sans-serif;background:#F8FAFC;color:var(--dark);line-height:1.6}
  .wrap{max-width:880px;margin:0 auto;padding:32px 20px 80px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px;color:var(--navy)}
  .brand i{color:var(--cyan)}
  .sub{color:var(--gray);font-size:14px;margin:0 0 28px}
  .userbox{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--gray)}
  .userbox b{color:var(--navy)}
  .btn{border:none;border-radius:10px;padding:11px 20px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
  .btn-primary{background:linear-gradient(135deg,var(--navy),var(--cyan));color:#fff}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}
  .btn-ghost{background:#fff;border:1px solid var(--line);color:var(--gray)}
  .btn-add{background:var(--light);color:var(--navy);font-size:14px;padding:9px 16px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:0 2px 4px rgba(0,0,0,.04)}
  .card h2{font-size:17px;margin:0 0 4px;color:var(--navy);display:flex;align-items:center;gap:8px}
  .card .hint{font-size:13px;color:var(--gray);margin:0 0 18px}
  label.field{display:block;font-size:13px;font-weight:600;color:var(--gray);margin-bottom:6px}
  input,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit}
  input:focus,select:focus{outline:none;border-color:var(--cyan)}
  .row{display:grid;gap:8px;align-items:center;margin-bottom:10px}
  .row.sites{grid-template-columns:1.2fr 1fr 1.4fr 44px}
  .row.sols{grid-template-columns:1fr 0.9fr 1.8fr 0.9fr 44px}
  .del{background:#FEF2F2;border:none;border-radius:9px;color:var(--red);cursor:pointer;height:40px;font-size:15px}
  .del:hover{background:#FEE2E2}
  .rowhead{font-size:12px;color:var(--gray);font-weight:600;margin-bottom:4px}
  .actions{display:flex;gap:12px;align-items:center;position:sticky;bottom:0;background:#F8FAFC;padding:16px 0}
  #toast{font-size:14px;font-weight:600}
  #toast.ok{color:var(--green)} #toast.err{color:var(--red)}
  .gate{text-align:center;padding:56px 20px}
  .gate i{font-size:40px;color:var(--cyan);margin-bottom:14px}
  .gate h2{margin:0 0 8px;color:var(--navy)}
  .gate p{color:var(--gray);margin:0 0 24px}
  #gbtn{display:flex;justify-content:center}
  .denied{color:var(--red);font-weight:600;margin-top:16px}
  .hidden{display:none!important}
  @media(max-width:640px){
    .row.sites,.row.sols{grid-template-columns:1fr 1fr;}
    .row .del{grid-column:1 / -1}
    .rowhead{display:none}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand"><i class="fas fa-circle-nodes"></i> 허브링크 관리자</div>
    <div id="userbox" class="userbox hidden">
      <span><b id="userEmail"></b> 로그인됨</span>
      <button class="btn btn-ghost" onclick="signOut()">로그아웃</button>
    </div>
  </div>
  <p class="sub">홈페이지의 이메일·주요 구축 사업장·GAS 솔루션 카드를 관리합니다.</p>

  <!-- 로그인 게이트 -->
  <div id="gate" class="card gate">
    <i class="fas fa-lock"></i>
    <h2>관리자 로그인</h2>
    <p>관리자 계정(master@hublink.co.kr)으로 로그인하세요.</p>
    <div id="gbtn"></div>
    <div id="denied" class="denied hidden"></div>
  </div>

  <!-- 편집 영역 -->
  <div id="editor" class="hidden">

    <div class="card">
      <h2><i class="fas fa-envelope"></i> 홈페이지 이메일</h2>
      <p class="hint">상담 신청 알림이 도착하고, 홈페이지에 표기되는 대표 이메일입니다.</p>
      <label class="field">대표 이메일</label>
      <input id="emailInput" type="email" placeholder="name@hublink.kr" oninput="config.contactEmail=this.value">
    </div>

    <div class="card">
      <h2><i class="fas fa-building"></i> 주요 구축 사업장</h2>
      <p class="hint">목록을 추가·수정·삭제할 수 있습니다.</p>
      <div class="row sites rowhead"><span>사업장명</span><span>위치</span><span>비고</span><span></span></div>
      <div id="sites"></div>
      <button class="btn btn-add" onclick="addSite()"><i class="fas fa-plus"></i> 사업장 추가</button>
    </div>

    <div class="card">
      <h2><i class="fas fa-diagram-project"></i> GAS 솔루션 카드</h2>
      <p class="hint">공개 홈페이지에 노출할 항목만 두세요. (내부·민감 시스템은 제외 권장)</p>
      <div class="row sols rowhead"><span>제목</span><span>규모</span><span>설명</span><span>상태</span><span></span></div>
      <div id="sols"></div>
      <button class="btn btn-add" onclick="addSol()"><i class="fas fa-plus"></i> 솔루션 추가</button>
    </div>

    <div class="actions">
      <button id="saveBtn" class="btn btn-primary" onclick="saveConfig()">변경사항 저장</button>
      <span id="toast"></span>
    </div>
  </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  // ===== 설정 =====
  const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbz6bBzHs0YgwopFeIWT5F69kx0Oma1w7MJjR3wjXWawMe6vfWx0I9WoaSUqsnNAfWrFGw/exec';
  const CLIENT_ID    = '여기에_OAuth_클라이언트_ID.apps.googleusercontent.com';
  const ADMIN_EMAIL  = 'master@hublink.co.kr';

  let idToken = null;
  let config  = { contactEmail:'', sites:[], gasSolutions:[] };

  // ===== Google 로그인 =====
  window.addEventListener('load', initGsi);
  function initGsi(){
    if(!window.google || !google.accounts || !google.accounts.id){ return setTimeout(initGsi,200); }
    google.accounts.id.initialize({ client_id: CLIENT_ID, callback: onCredential });
    google.accounts.id.renderButton(document.getElementById('gbtn'),
      { theme:'outline', size:'large', text:'signin_with', locale:'ko', width:260 });
  }

  function onCredential(resp){
    idToken = resp.credential;
    let payload;
    try { payload = decodeJwt(idToken); } catch(e){ return showDenied('(토큰 해석 실패)'); }
    if(payload.email !== ADMIN_EMAIL){ return showDenied(payload.email || '알 수 없음'); }
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('editor').classList.remove('hidden');
    document.getElementById('userbox').classList.remove('hidden');
    document.getElementById('userEmail').textContent = payload.email;
    loadConfig();
  }

  function showDenied(email){
    const d = document.getElementById('denied');
    d.textContent = '권한이 없는 계정입니다: ' + email;
    d.classList.remove('hidden');
  }

  function signOut(){
    idToken = null;
    if(window.google && google.accounts) google.accounts.id.disableAutoSelect();
    location.reload();
  }

  function decodeJwt(t){
    const b = t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    const json = decodeURIComponent(atob(b).split('').map(function(c){
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(json);
  }

  // ===== 설정 불러오기 (JSONP) =====
  function jsonpConfig(){
    return new Promise(function(resolve,reject){
      const cb = '__cfg_' + Date.now();
      const s = document.createElement('script');
      const timer = setTimeout(function(){ cleanup(); reject(new Error('timeout')); }, 8000);
      function cleanup(){ clearTimeout(timer); delete window[cb]; s.remove(); }
      window[cb] = function(res){ cleanup(); resolve(res && res.config ? res.config : null); };
      s.src = GAS_ENDPOINT + '?callback=' + cb + '&_=' + Date.now();
      s.onerror = function(){ cleanup(); reject(new Error('network')); };
      document.body.appendChild(s);
    });
  }

  function loadConfig(){
    toast('불러오는 중…','');
    jsonpConfig().then(function(cfg){
      config = normalize(cfg);
      renderAll();
      toast('','');
    }).catch(function(){ toast('설정을 불러오지 못했습니다','err'); });
  }

  function normalize(cfg){
    cfg = cfg || {};
    return {
      contactEmail: cfg.contactEmail || '',
      sites: Array.isArray(cfg.sites) ? cfg.sites : [],
      gasSolutions: Array.isArray(cfg.gasSolutions) ? cfg.gasSolutions : []
    };
  }

  // ===== 렌더링 =====
  function esc(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

  function renderAll(){
    document.getElementById('emailInput').value = config.contactEmail || '';
    renderSites();
    renderSols();
  }

  function renderSites(){
    document.getElementById('sites').innerHTML = config.sites.map(function(s,i){
      return '<div class="row sites">' +
        '<input value="'+esc(s.name)+'" placeholder="사업장명" oninput="upd(\'sites\','+i+',\'name\',this.value)">' +
        '<input value="'+esc(s.location)+'" placeholder="위치" oninput="upd(\'sites\','+i+',\'location\',this.value)">' +
        '<input value="'+esc(s.note)+'" placeholder="비고" oninput="upd(\'sites\','+i+',\'note\',this.value)">' +
        '<button class="del" onclick="del(\'sites\','+i+')" aria-label="삭제"><i class="fas fa-trash"></i></button>' +
      '</div>';
    }).join('');
  }

  function renderSols(){
    document.getElementById('sols').innerHTML = config.gasSolutions.map(function(g,i){
      return '<div class="row sols">' +
        '<input value="'+esc(g.title)+'" placeholder="제목" oninput="upd(\'gasSolutions\','+i+',\'title\',this.value)">' +
        '<input value="'+esc(g.count)+'" placeholder="예: 6개 시스템" oninput="upd(\'gasSolutions\','+i+',\'count\',this.value)">' +
        '<input value="'+esc(g.desc)+'" placeholder="설명" oninput="upd(\'gasSolutions\','+i+',\'desc\',this.value)">' +
        '<input value="'+esc(g.status)+'" placeholder="예: 운영중" oninput="upd(\'gasSolutions\','+i+',\'status\',this.value)">' +
        '<button class="del" onclick="del(\'gasSolutions\','+i+')" aria-label="삭제"><i class="fas fa-trash"></i></button>' +
      '</div>';
    }).join('');
  }

  // ===== 편집 핸들러 =====
  function upd(field,i,key,val){ config[field][i][key] = val; }
  function del(field,i){ config[field].splice(i,1); field==='sites'?renderSites():renderSols(); }
  function addSite(){ config.sites.push({name:'',location:'',note:''}); renderSites(); }
  function addSol(){ config.gasSolutions.push({title:'',count:'',desc:'',status:'운영중'}); renderSols(); }

  // ===== 저장 (no-cors POST → 재조회로 검증) =====
  function saveConfig(){
    if(!idToken){ return toast('로그인이 필요합니다','err'); }
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; toast('저장 중…','');
    const body = new URLSearchParams({
      action:'adminSave', idToken: idToken, config: JSON.stringify(config)
    });
    fetch(GAS_ENDPOINT, { method:'POST', mode:'no-cors', body: body })
      .then(function(){ return new Promise(function(r){ setTimeout(r,1300); }); })
      .then(jsonpConfig)
      .then(function(fresh){
        fresh = normalize(fresh);
        const ok = fresh.contactEmail === (config.contactEmail||'')
          && fresh.sites.length === config.sites.length
          && fresh.gasSolutions.length === config.gasSolutions.length;
        toast(ok ? '저장되었습니다 ✓' : '저장 확인 실패 — 권한/네트워크를 확인하세요', ok?'ok':'err');
      })
      .catch(function(){ toast('전송 오류가 발생했습니다','err'); })
      .finally(function(){ btn.disabled = false; });
  }

  function toast(msg,cls){
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = cls || '';
  }
</script>
</body>
</html>
